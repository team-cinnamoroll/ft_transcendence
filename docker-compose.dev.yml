services:
  dev-container:
    build:
      context: .
      dockerfile: .devcontainer/Dockerfile
    volumes:
      - .:/workspace:cached
      - workspace_node_modules:/workspace/node_modules
      - /var/run/docker.sock:/var/run/docker.sock
    working_dir: /workspace
    command: sleep infinity
    extra_hosts:
      - "tracen.local:127.0.0.1"
      - "registry.tracen.local:127.0.0.1"

  ci-docker:
    image: docker:27-dind
    privileged: true
    environment:
      DOCKER_TLS_CERTDIR: ""
    volumes:
      - ci_docker_data:/var/lib/docker
      - .:/workspace:cached
    entrypoint: ["/bin/sh", "-ec"]
    command:
      - |
        if [ -f /workspace/containers/infra/local-prod/certs/ca.crt ]; then
          mkdir -p /etc/docker/certs.d/registry.tracen.local:5000
          cp /workspace/containers/infra/local-prod/certs/ca.crt /etc/docker/certs.d/registry.tracen.local:5000/ca.crt
        fi
        exec dockerd-entrypoint.sh --host=tcp://0.0.0.0:2375 --host=unix:///var/run/docker.sock
    extra_hosts:
      - "tracen.local:127.0.0.1"
      - "registry.tracen.local:127.0.0.1"
    healthcheck:
      test: ["CMD-SHELL", "docker info >/dev/null 2>&1"]
      interval: 2s
      timeout: 5s
      retries: 30

  frontend:
    image: mcr.microsoft.com/devcontainers/javascript-node:24
    env_file:
      - .env.dev
    volumes:
      - .:/workspace:cached
      - workspace_node_modules:/workspace/node_modules
    working_dir: /workspace
    command: sh -lc "corepack enable && COREPACK_ENABLE_DOWNLOAD_PROMPT=0 pnpm --filter @tracen/frontend-bff exec next dev --hostname 0.0.0.0 --port 3000"
    depends_on:
      - backend
    ports:
      - "3000:3000"

  backend:
    image: mcr.microsoft.com/devcontainers/javascript-node:24
    env_file:
      - .env.dev
    volumes:
      - .:/workspace:cached
      - workspace_node_modules:/workspace/node_modules
    working_dir: /workspace
    command: sh -lc "corepack enable && COREPACK_ENABLE_DOWNLOAD_PROMPT=0 pnpm --filter @tracen/backend exec vite --host 0.0.0.0 --port 8000"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - frontend
      - backend
    ports:
      - "8080:80"
    volumes:
      - ./containers/infra/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro

  db:
    image: postgres:17-alpine
    env_file:
      - .env.dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./containers/infra/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 2s
      timeout: 5s
      retries: 30

volumes:
  workspace_node_modules:
  postgres_data:
  ci_docker_data:
