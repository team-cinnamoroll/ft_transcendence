services:
  dev-container:
    build:
      context: .
      dockerfile: .devcontainer/Dockerfile
    volumes:
      - .:/workspace:cached
      - workspace_node_modules:/workspace/node_modules
    working_dir: /workspace
    command: sleep infinity

  frontend:
    image: mcr.microsoft.com/devcontainers/javascript-node:24
    volumes:
      - .:/workspace:cached
      - workspace_node_modules:/workspace/node_modules
    working_dir: /workspace
    command: sh -lc "corepack enable && COREPACK_ENABLE_DOWNLOAD_PROMPT=0 pnpm --filter @tracen/frontend-bff exec next dev --hostname 0.0.0.0 --port 3000"
    depends_on:
      - backend
    ports:
      - "3000:3000"

  backend:
    image: mcr.microsoft.com/devcontainers/javascript-node:24
    volumes:
      - .:/workspace:cached
      - workspace_node_modules:/workspace/node_modules
    working_dir: /workspace
    command: sh -lc "corepack enable && COREPACK_ENABLE_DOWNLOAD_PROMPT=0 pnpm --filter @tracen/backend exec vite --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - frontend
      - backend
    ports:
      - "8080:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro

  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: tracen
      POSTGRES_USER: tracen
      POSTGRES_PASSWORD: tracen
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

volumes:
  workspace_node_modules:
  postgres_data:
